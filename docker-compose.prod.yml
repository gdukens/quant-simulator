# Production Docker Compose Configuration
# Includes Streamlit app, Redis cache, and monitoring

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────
  # QuantLib Pro Application
  # ─────────────────────────────────────────────────────────────────────────
  quantlib-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-2025-01-01}
        - VERSION=${VERSION:-1.0.0}
    image: quantlib-pro:${VERSION:-latest}
    container_name: quantlib-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_TTL=${CACHE_TTL:-3600}
    env_file:
      - .env
    volumes:
      # Persistent data
      - quantlib-data:/app/data
      - quantlib-logs:/app/data/logs
      - quantlib-cache:/app/data/cache
    depends_on:
      - redis
    networks:
      - quantlib-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: quantlib-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantlib_db}
      POSTGRES_USER: ${POSTGRES_USER:-quantlib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quantlib-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantlib}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # TimescaleDB (Time-Series Data)
  # ─────────────────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: quantlib-timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-timeseries_db}
      POSTGRES_USER: ${POSTGRES_USER:-quantlib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - timescale-data:/var/lib/postgresql/data
    networks:
      - quantlib-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantlib}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantlib-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - quantlib-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Application (Instance 1)
  # ─────────────────────────────────────────────────────────────────────────
  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantlib-pro:${VERSION:-latest}
    container_name: quantlib-api-1
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: uvicorn main_api:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-quantlib}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-quantlib_db}
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-quantlib}:${POSTGRES_PASSWORD:-changeme}@timescaledb:5432/${TIMESCALE_DB:-timeseries_db}
      - REDIS_URL=redis://redis:6379/0
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - quantlib-logs:/app/data/logs
    depends_on:
      - postgres
      - timescaledb
      - redis
    networks:
      - quantlib-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Application (Instance 2 - for HA)
  # ─────────────────────────────────────────────────────────────────────────
  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantlib-pro:${VERSION:-latest}
    container_name: quantlib-api-2
    restart: unless-stopped
    ports:
      - "8001:8000"
    command: uvicorn main_api:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-quantlib}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-quantlib_db}
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-quantlib}:${POSTGRES_PASSWORD:-changeme}@timescaledb:5432/${TIMESCALE_DB:-timeseries_db}
      - REDIS_URL=redis://redis:6379/0
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - quantlib-logs:/app/data/logs
    depends_on:
      - postgres
      - timescaledb
      - redis
    networks:
      - quantlib-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Workers (Async Task Processing)
  # ─────────────────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantlib-pro:${VERSION:-latest}
    restart: unless-stopped
    command: celery -A quantlib_pro.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-quantlib}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-quantlib_db}
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-quantlib}:${POSTGRES_PASSWORD:-changeme}@timescaledb:5432/${TIMESCALE_DB:-timeseries_db}
      - REDIS_URL=redis://redis:6379/0
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
    depends_on:
      - redis
      - postgres
      - timescaledb
    networks:
      - quantlib-network
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ─────────────────────────────────────────────────────────────────────────
  # Dask Scheduler (Distributed Computing)
  # ─────────────────────────────────────────────────────────────────────────
  dask-scheduler:
    image: daskdev/dask:latest
    container_name: quantlib-dask-scheduler
    restart: unless-stopped
    command: dask-scheduler
    ports:
      - "8786:8786"
      - "8787:8787"
    environment:
      DASK_DISTRIBUTED__SCHEDULER__WORK_STEALING: "True"
    networks:
      - quantlib-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ─────────────────────────────────────────────────────────────────────────
  # Dask Workers (Distributed Computing)
  # ─────────────────────────────────────────────────────────────────────────
  dask-worker:
    image: daskdev/dask:latest
    restart: unless-stopped
    command: dask-worker dask-scheduler:8786 --nthreads 2 --memory-limit 2GB
    depends_on:
      - dask-scheduler
    networks:
      - quantlib-network
    deploy:
      replicas: 10
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy (for production load balancing)
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: quantlib-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - quantlib-app
    networks:
      - quantlib-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ─────────────────────────────────────────────────────────────────────────
  # Prometheus (Metrics Collection)
  # ─────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: quantlib-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - quantlib-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ─────────────────────────────────────────────────────────────────────────
  # Grafana (Monitoring Dashboards)
  # ─────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: quantlib-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - quantlib-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  quantlib-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ─────────────────────────────────────────────────────────────────────────────
# Persistent Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  quantlib-data:
    driver: local
  quantlib-logs:
    driver: local
  quantlib-cache:
    driver: local
  postgres-data:
    driver: local
  timescale-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
