# ═══════════════════════════════════════════════════════════════════════════
# PostgreSQL Host-Based Authentication - Production Configuration  
# ═══════════════════════════════════════════════════════════════════════════
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections
local   all             postgres                                peer
local   all             all                                     scram-sha-256

# IPv4 local connections - production security
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker network connections (restrict to quantlib user only)
host    quantlib_pro    quantlib        172.20.0.0/16          scram-sha-256
host    timeseries_db   quantlib        172.20.0.0/16          scram-sha-256

# SSL-only connections for production
hostssl all             all             0.0.0.0/0              scram-sha-256

# Deny all other connections
host    all             all             0.0.0.0/0              reject