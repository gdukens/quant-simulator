version: "3.8"

# ── Development environment ───────────────────────────────────────────────────
# Usage:
#   docker compose up -d           # Start all services
#   docker compose up -d redis db  # Start infrastructure only
#   docker compose logs -f app     # Follow app logs

services:

  # ─── Core Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runtime
    container_name: quantlib-pro-app
    command: uvicorn main_api:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./quantlib_pro:/app/quantlib_pro:ro  # Hot reload in dev
      - ./logs:/app/logs
      - ./cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Streamlit UI (development) ────────────────────────────────────────────
  streamlit:
    build:
      context: .
      target: runtime
    container_name: quantlib-pro-ui
    command: streamlit run streamlit_app.py --server.port 8503 --server.address 0.0.0.0
    env_file: .env
    ports:
      - "8503:8503"
    volumes:
      - ./quantlib_pro:/app/quantlib_pro:ro
    depends_on:
      - app
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantlib-pro-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devpassword}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL (audit log, users) ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: quantlib-pro-db
    environment:
      POSTGRES_USER: quantlib
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: quantlib_pro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantlib -d quantlib_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: quantlib-pro-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    profiles: ["observability"]

  grafana:
    image: grafana/grafana:10.3.0
    container_name: quantlib-pro-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles: ["observability"]

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: quantlib-pro-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    restart: unless-stopped
    profiles: ["observability"]

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: quantlib-pro-network
