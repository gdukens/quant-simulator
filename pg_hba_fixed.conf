# PostgreSQL Client Authentication Configuration File
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections (inside container)
local   all             all                                     trust

# Docker host specific (this is key for external connections!)
host    all             all             172.17.0.1/32           trust

# Host connections from Docker networks  
host    all             all             172.16.0.0/12           trust
host    all             all             10.0.0.0/8              trust 
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Allow any other host with trust (for development)
host    all             all             0.0.0.0/0               trust

# Replication connections
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
host    replication     all             172.17.0.1/32           trust